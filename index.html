<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>اذكار</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&family=Poppins&display=swap" rel="stylesheet">

</head>
<body>


    <header>
        
    <a href="Quran/index.html"  id="e" style="font-family: 'Noto Kufi Arabic', sans-serif;">القرآن الكريم <i class="fa-solid fa-book-quran"></i> </a>
        <button  id="d" style="border: none ;outline: none;cursor: pointer;" > <i class="fa-solid fa-brush"></i></i></a>
        
    
    </header>


        <section id="main">
            <h1 style="font-family: 'Noto Kufi Arabic', sans-serif;">الاذكار</h1>
            <h2>0/33</h2>
            <div class="widget">
                <div class="card">
                    <span style="font-family: 'Noto Kufi Arabic', sans-serif;">سبحان الله</span>
                </div>
                <div class="list">
 <button class="rbtn" onclick="i=(i+1)%ازكار.length; update();"><</button>
        <button class="rbtn" onclick="i=(i-1+ازكار.length)%ازكار.length; update();">></button>
                </div>
            </div>
            <button class="btn" style="font-family: 'Noto Kufi Arabic', sans-serif;">سبح</button>
        </section>
            

        <script>
            let n=0;
            let i=0;
            let ازكار=["سبحان الله","الحمد لله","لا إله إلا الله","الله أكبر"];
            let btn=document.querySelector(".btn");
            let card=document.querySelector(".card span");
            let h2=document.querySelector("h2");
            function update() {
        card.textContent = ازكار[i];
        n = 0; // Reset count when changing ritual
        h2.textContent = `${n}/33`;
    }
            btn.addEventListener("click",()=>{
                n++;
                if(n==33){
                    n=0;
                    ازكار.push(ازكار.shift());
                    card.textContent=ازكار[0];
                }
                h2.textContent=`${n}/33`;
            })

            list=[`--color: #007bff;        /* Replaces red */
--lightest: #d4e8ff;     /* Replaces lightest orange */
--light: #a9cdfc;        /* Replaces light orange */
--acent-color: #5b9dff;  /* Replaces accent orange */
--dark: #1945ad;         /* Replaces dark red */
--darkest: #142e5f;      /* Replaces darkest red */`,
`--color: #28a745;        /* Replaces red */
--lightest: #d4ffd9;     /* Replaces lightest orange */
--light: #a9fcb5;        /* Replaces light orange */
--acent-color: #5bff67;  /* Replaces accent orange */
--dark: #19ad2a;         /* Replaces dark red */
--darkest: #145f1b;      /* Replaces darkest red */`,
`--color: #ffc107;        /* Replaces red */
--lightest: #fff9e0;     /* Replaces lightest orange */
--light: #fff0a9;        /* Replaces light orange */
--acent-color: #ffd85b;  /* Replaces accent orange */
--dark: #ad8f19;         /* Replaces dark red */
--darkest: #5f4d14;      /* Replaces darkest red */`,`
--color: #ff6600;        /* Vibrant Orange */
--lightest: #fff0e6;     /* Soft Creamsicle */
--light: #ffc299;        /* Warm Peach */
--acent-color: #ff9955;  /* Sunset Accent */
--dark: #cc5200;         /* Deep Burnt Orange */
--darkest: #803300;`,
`--color: #8800ff;        
--lightest: #f0d4ff;
--light: #c7a9fc;
--acent-color: #a45bff;
--dark: #4d19ad;   
--darkest: #27145f;`,
`--color: #ff007f;
--lightest: #ffe0ef;
--light: #fca9d3;
--acent-color: #ff5baf;
--dark: #ad1964;
--darkest: #5f143a;`,
`
    --color:#f00;
    --lightest:#ffe2d4;
    --light:#fcb8a9;
    --acent-color:#ff675b;
    --dark:#AD2519;
    --darkest:#5f1914;
`

]
i=0

document.getElementById("d").addEventListener("click", ()=>{
    document.querySelector("body").style=list[i];
    i=(i+1)%list.length
});

        </script>




</body></html>
